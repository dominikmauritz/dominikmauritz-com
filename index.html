<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dominik Mauritz</title>
    <meta name="description" content="Founder of vio:networks" />
    <meta name="color-scheme" content="dark only" />
    <meta property="og:site_name" content="Dominik Mauritz" />
    <meta property="og:title" content="Dominik Mauritz" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Founder of vio:networks" />
    <meta property="og:image" content="https://dominikmauritz.com/card.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:url" content="https://dominikmauritz.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://dominikmauritz.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #0e0e10;
        --card-bg: #161618;
        --card-border: #232327;
        --text: #9a9aa2;
        --heading: #f2f2f4;
        --link: #b69bff;
        --link-hover: #d6c6ff;
        --twitter: #2a2a30;
        --linkedin: #2a2a30;
        --instagram: #2a2a30;
        --button-hover: #34343c;
        --shadow: 0 1.75rem 4rem rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: var(--page-bg);
        color: var(--text);
        font-family: "Public Sans", sans-serif;
      }

      a {
        color: inherit;
      }

      main {
        width: min(100%, 24rem);
        padding: 2rem;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 0.75rem;
        box-shadow: var(--shadow);
      }

      header {
        display: grid;
        justify-items: center;
        gap: 1rem;
        text-align: center;
      }

      .avatar {
        width: 5.75rem;
        height: 5.75rem;
        border-radius: 50%;
        object-fit: cover;
        display: block;
      }

      h1,
      h2 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.25;
        font-weight: 300;
        letter-spacing: -0.05rem;
        color: var(--heading);
      }

      .location {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        font-size: 0.875rem;
        font-weight: 300;
        letter-spacing: -0.01rem;
        color: var(--text);
      }

      .location svg {
        width: 0.875rem;
        height: 0.875rem;
        flex: 0 0 auto;
        fill: currentColor;
        opacity: 0.8;
      }

      .location-aside {
        opacity: 0.65;
      }

      .bio {
        margin: 0;
        font-size: 0.9375rem;
        line-height: 1.7;
        font-weight: 300;
        letter-spacing: -0.01rem;
        text-align: center;
      }

      .bio p {
        margin: 0;
      }

      .bio p + p {
        margin-top: 0.75rem;
      }

      .bio a {
        color: var(--link);
        text-decoration: none;
      }

      .bio a:hover {
        color: var(--link-hover);
      }

      .tagline,
      .imprint {
        margin: 0;
        font-size: 1rem;
        line-height: 1.75;
        font-weight: 300;
        letter-spacing: -0.025rem;
      }

      .tagline a,
      .imprint a {
        color: var(--link);
        text-decoration: none;
      }

      .tagline a:hover,
      .imprint a:hover {
        color: var(--link-hover);
      }

      hr {
        margin: 1.5rem 0;
        border: 0;
        border-top: 1px solid var(--card-border);
      }

      .socials {
        list-style: none;
        padding: 0;
        margin: 0 0 1.5rem;
        display: grid;
        gap: 0.625rem;
      }

      .socials a {
        width: 100%;
        min-height: 3rem;
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 0.5rem;
        padding: 0 1.5rem;
        border-radius: 0.375rem;
        color: #ffffff;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.2rem;
        font-size: 0.75rem;
        font-weight: 700;
        transition: transform 0.25s ease, background-color 0.25s ease;
      }

      .socials a:hover {
        background: var(--button-hover);
        transform: scale(1.025);
      }

      .socials svg {
        width: 1.125rem;
        height: 1.125rem;
        flex: 0 0 auto;
        fill: currentColor;
      }

      .twitter {
        background: var(--twitter);
      }

      .linkedin {
        background: var(--linkedin);
      }

      .instagram {
        background: var(--instagram);
      }

      .imprint strong {
        color: inherit;
        font-weight: 700;
      }

      .imprint p {
        margin: 0;
      }

      .imprint p + p {
        margin-top: 1rem;
      }

      @media (max-width: 360px) {
        body {
          padding: 0.75rem;
        }

        main {
          padding: 1.5rem;
        }

        h1,
        h2 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header id="home">
        <img class="avatar" src="./avatar.jpg" alt="Portrait of Dominik Mauritz" />
        <h1>Dominik Mauritz</h1>
        <p class="location">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z"
            />
          </svg>
          <span>Planet Earth <span class="location-aside">(for now)</span></span>
        </p>
      </header>

      <hr />

      <div class="bio">
        <p>
          Founded
          <a
            href="https://www.vionetworks.de"
            target="_blank"
            rel="noreferrer noopener"
            >vio:networks</a
          >, built a great team, and later sold the company to
          <a
            href="https://www.starface.com"
            target="_blank"
            rel="noreferrer noopener"
            >STARFACE</a
          > &mdash; now enjoying its growth from the sidelines.
        </p>
        <p>
          Currently between Latin America and Asia, exploring new tech and
          looking for what&rsquo;s next.
        </p>
      </div>

      <hr />

              />

          </a>
        </li>
        <li>
          <a
            class="linkedin"
            href="https://de.linkedin.com/in/dominik-mauritz-2ab993b2"
            target="_blank"
            rel="noreferrer noopener"
          >
            <svg viewBox="0 0 40 40" aria-hidden="true">
              <path
                d="M12.1 13.8v19.1H5.7V13.8Zm.4-5.9c0 .9-.3 1.7-1 2.4-.7.6-1.5.9-2.6.9h0c-1.1 0-1.9-.3-2.5-.9-.6-.6-1-1.4-1-2.4 0-1 .3-1.7 1-2.4S7.9 4.6 9 4.6s1.9.3 2.6.9 1 1.4 1 2.4ZM35 22v11h-6.4V22.7c0-1.4-.3-2.4-.8-3.2-.5-.8-1.3-1.1-2.4-1.1-.8 0-1.5.2-2 .7-.5.4-1 1-1.2 1.7-.1.4-.2.9-.2 1.6v10.7h-6.4c0-5.1 0-9.3 0-12.5s0-5.1 0-5.7l0-.9H22v2.8h0c.3-.4.5-.8.8-1.1.3-.3.6-.6 1.1-1 .5-.4 1-.6 1.7-.8.7-.2 1.4-.3 2.2-.3 2.2 0 4 .7 5.3 2.2C34.4 17 35 19.1 35 22Z"
              />

        <li>
          <a
            class="instagram"
            href="https://www.instagram.com/dominik_mauritz/"
            target="_blank"
            rel="noreferrer noopener"
          >
            <svg viewBox="0 0 40 40" aria-hidden="true">
              <path
                d="M20 7c4.2 0 4.7 0 6.3.1 1.5.1 2.3.3 3 .5.7.3 1.2.6 1.8 1.2.5.5.9 1.1 1.2 1.8.2.5.5 1.4.5 3 .1 1.6.1 2.1.1 6.3s0 4.7-.1 6.3c-.1 1.5-.3 2.3-.5 3-.3.7-.6 1.2-1.2 1.8-.5.5-1.1.9-1.8 1.2-.5.2-1.4.5-3 .5-1.6.1-2.1.1-6.3.1s-4.7 0-6.3-.1c-1.5-.1-2.3-.3-3-.5-.7-.3-1.2-.6-1.8-1.2-.5-.5-.9-1.1-1.2-1.8-.2-.5-.5-1.4-.5-3C7 24.7 7 24.2 7 20s0-4.7.1-6.3c.1-1.5.3-2.3.5-3C8 10 8.3 9.5 8.9 8.9 9.4 8.4 10 8 10.7 7.7c.5-.2 1.4-.5 3-.5C15.3 7.1 15.8 7 20 7Zm0-2.7c-4.3 0-4.8 0-6.5.1-1.6 0-2.8.3-3.8.7C8.7 5.5 7.8 6 6.9 6.9 6 7.8 5.5 8.7 5.1 9.7c-.4 1-.6 2.1-.7 3.8-.1 1.7-.1 2.2-.1 6.5s0 4.8.1 6.5c0 1.6.3 2.8.7 3.8.4 1 .9 1.9 1.8 2.8.9.9 1.7 1.4 2.8 1.8 1 .4 2.1.6 3.8.7 1.6.1 2.2.1 6.5.1s4.8 0 6.5-.1c1.6-.1 2.9-.3 3.8-.7 1-.4 1.9-.9 2.8-1.8.9-.9 1.4-1.7 1.8-2.8.4-1 .6-2.1.7-3.8.1-1.6.1-2.2.1-6.5s0-4.8-.1-6.5c-.1-1.6-.3-2.9-.7-3.8-.4-1-.9-1.9-1.8-2.8-.9-.9-1.7-1.4-2.8-1.8-1-.4-2.1-.6-3.8-.7-1.6-.1-2.2-.1-6.5-.1Zm0 7.6c-4.5 0-8.1 3.7-8.1 8.1s3.7 8.1 8.1 8.1 8.1-3.7 8.1-8.1-3.7-8.1-8.1-8.1Zm0 13.3c-2.9 0-5.2-2.3-5.2-5.2s2.3-5.2 5.2-5.2 5.2 2.3 5.2 5.2-2.3 5.2-5.2 5.2Zm10.6-13.6c0 1-.8 1.9-1.9 1.9-1 0-1.9-.8-1.9-1.9s.8-1.9 1.9-1.9c1 0 1.9.8 1.9 1.9Z"

      </ul>

    </main>
  </body>
</html>
